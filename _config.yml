# -------------------
# Jekyll Config
# --------------------
baseurl: ""
url: ""
permalink: pretty
markdown: kramdown
highlighter: rouge

# Plugins
plugins:
  - jekyll-environment-variables
  - jekyll-paginate

paginate: 6
paginate_path: "/blog/page/:num"

# Collections
collections_dir: collections
collections:
  projects:
    output: true
    permalink: /:collection/:path/
  posts:
    output: true
    permalink: /blog/:path/

# Pages
defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: project
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      weight: 999
  - scope:
      path: "images"
    values:
      image: true
  - scope:
      path: "categories"
    values:
      permalink: /category/:basename/
  - scope:
      path: "pages"
    values:
      permalink: /:basename/

# SCSS
sass:
  style: compact

# Excludes
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - netlify.toml


# -------------------
# Theme Config
# --------------------
title: "War Hares"
category_dir: category

colors:
  # light-mode colors (pink & white - Energizer Bunny inspired)
  primary_bg: "#ffffff"         # pure white background
  primary_bg_2: "#fff5f8"       # soft pink tint
  primary_bg_3: "#ffe8f0"       # light pink
  primary_text: "#1a1a2e"       # near-black text
  base_bg: "#ffffff"
  base_bg_2: "#fff5f8"
  base_bg_3: "#ffe8f0"
  base_text: "#1a1a2e"
  base_text_2: "#ff1493"        # hot pink accent
  logo_text: "#ff1493"          # hot pink logo
  header_text: "#1a1a2e"

  # dark-mode colors
  primary_bg_dark: "#1a0010"
  primary_bg_2_dark: "#280018"
  primary_bg_3_dark: "#380025"
  primary_text_dark: "#fff5f8"
  base_bg_dark: "#280018"
  base_bg_2_dark: "#1a0010"
  base_bg_3_dark: "#280018"
  base_text_dark: "#fff5f8"
  base_text_2_dark: "#ff1493"   # hot pink accent for dark mode
  logo_text_dark: "#ff69b4"
  header_text_dark: "#fff5f8"

fonts:
  use_google_fonts: false
  google_fonts_url: "https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,700&family=Fira+Mono&display=swap"
  use_self_hosted_fonts: true # font files must be placed in /assets/fonts folder and the @font-face definitions must be added to /assets/css/fonts.css
  heading: "'DM Sans'"
  base: "'DM Sans'"
  monospace: "'Fira Mono'"
  logo: "'DM Sans'"

logo:
  logo_text: "War Hares"
  logo_image: assets/images/logo/logo.png
  logo_image_mobile: assets/images/logo/logo-mobile.png
  logo_image_invert: assets/images/logo/logo.png
  logo_image_invert_mobile: assets/images/logo/logo-mobile.png
  logo_image_desktop_height: "28px"
  logo_image_desktop_width: "28px"
  logo_image_mobile_height: "28px"
  logo_image_mobile_width: "28px"
  show_logo_image_on_mobile: true
  show_logo_image_on_desktop: true
  show_logo_text_on_mobile: false
  show_logo_text_on_desktop: false

header: 
  fixed: false

open_graph:
  meta_opengraph_type: "website"
  meta_twitter_card: "summary"
  meta_twitter_site: ""
  meta_twitter_creator: ""

darkmode:
  enable_dark_mode: true
  show_dark_mode_toggle_in_header: true
  show_dark_mode_toggle_in_bottom: false
  show_dark_mode_toggle_in_mobile_menu: true

cookie_banner:
  enabled: false
  show_manage_cookies_at_bottom: false

analytics:
  google_analytics_id: "" # G-XXXXXXXXXX
  gtm_id: "" # GTM-XXXXXXXX
  plausible_data_domain: "" # example: mywebsite.com
  umami_data_website_id: "" # example: "ddd14336-5fb0-4cdd-8f32-e1bfa906cc2b"
  umami_src: "" # "https://analytics.eu.umami.is/script.js"

comments:
  commento:
    enabled: true # you must have a commento account and be on the correct domain. does not work locally.
  disqus:
    shortname: "" # Your disqus shortcode for example "zerostatic". leave this blank ie "" to disable.

contact_form: 
  use_netlify_form: false
  use_formspree_form: false
  formspree_endpoint: ""
  netlify_form_name: "contact"

menu: 
  show_dropdown_items_in_mobile_menu: false
  show_social_media_in_mobile_menu: true

footer:
  enable_footer: true
  footer_title: "War Hares"
  footer_description: "WOCS 24-001 - Our Time Is Now"
  enable_social_media_icons: true
  enable_contact_details: false
  enable_menu_footer_primary: true
  enable_menu_footer_secondary: true
  enable_menu_footer_tertiary: false
  footer_primary_menu_title: "Navigate"
  footer_secondary_menu_title: "Site"
  footer_tertiary_menu_title: "Other"

bottom:
  enable_bottom: true
  enable_bottom_menu: false
  copyright_text: "© 2024 War Hares - WOCS 24-001"
  show_rss_icon: false
